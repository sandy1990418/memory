version: "3.9"
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: openclaw-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: memuser
      POSTGRES_PASSWORD: mempass
      POSTGRES_DB: memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memuser -d memory"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - openclaw_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openclaw-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openclaw.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      pgvector:
        condition: service_healthy

volumes:
  openclaw_pgdata:
